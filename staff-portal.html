<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Portal — Empire Roleplay</title>
  <link rel="icon" type="image/png" href="empire-logo.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#060504;--sidebar:#080706;--panel:#0f0d0b;--panel2:#161310;
      --gold:#f6b13a;--gold2:#ff7200;--text:#f2ede4;--muted:#a89880;
      --line:rgba(246,177,58,.15);--line2:rgba(255,255,255,.07);
      --green:#39ff82;--red:#ff3c3c;--discord:#5865F2;
      --r:16px;--sidebar-w:260px;
      --rank-color:#f6b13a;--rank-bg:rgba(246,177,58,.12);--rank-border:rgba(246,177,58,.3);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);display:flex}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;font-family:inherit}
    input,textarea,select{font-family:inherit;color:var(--text);background:transparent}

    /* ═══════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════ */
    .sidebar{
      width:var(--sidebar-w);flex-shrink:0;
      background:var(--sidebar);
      border-right:1px solid var(--line);
      display:flex;flex-direction:column;
      height:100vh;overflow:hidden;
      transition:transform .3s;
      position:relative;z-index:50;
    }
    .sb-header{
      padding:20px 20px 16px;
      border-bottom:1px solid var(--line);
      display:flex;align-items:center;gap:10px;
    }
    .sb-logo{height:34px;filter:drop-shadow(0 0 10px rgba(246,177,58,.5))}
    .sb-brand{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:.05em;text-transform:uppercase}

    /* User card in sidebar */
    .sb-user{
      padding:16px 20px;
      border-bottom:1px solid var(--line);
      display:flex;align-items:center;gap:12px;
    }
    .sb-avatar-wrap{position:relative;flex-shrink:0}
    .sb-avatar{width:44px;height:44px;border-radius:50%;border:2px solid var(--rank-color);object-fit:cover}
    .sb-status{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--sidebar)}
    .sb-user-info{flex:1;min-width:0}
    .sb-display-name{font-weight:900;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-rank-badge{
      display:inline-flex;align-items:center;gap:5px;
      font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;
      color:var(--rank-color);margin-top:2px;
    }
    .sb-rank-dot{width:6px;height:6px;border-radius:50%;background:var(--rank-color)}

    /* Nav items */
    .sb-nav{flex:1;overflow-y:auto;padding:12px 0}
    .sb-nav::-webkit-scrollbar{width:3px}
    .sb-nav::-webkit-scrollbar-track{background:transparent}
    .sb-nav::-webkit-scrollbar-thumb{background:rgba(246,177,58,.2);border-radius:99px}
    .sb-section-label{
      padding:10px 20px 6px;
      font-size:10px;font-weight:800;color:rgba(168,152,128,.45);
      text-transform:uppercase;letter-spacing:.15em;
    }
    .sb-item{
      display:flex;align-items:center;gap:10px;
      padding:10px 20px;
      font-size:13px;font-weight:700;color:var(--muted);
      cursor:pointer;transition:.2s;border:none;background:none;
      width:100%;text-align:left;position:relative;
    }
    .sb-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
    .sb-item.active{color:var(--gold);background:rgba(246,177,58,.08)}
    .sb-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
    .sb-item-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
    .sb-item-badge{
      margin-left:auto;background:var(--red);color:#fff;
      font-size:10px;font-weight:900;border-radius:999px;
      padding:2px 7px;min-width:18px;text-align:center;
    }
    .sb-item.locked{opacity:.35;pointer-events:none}
    .sb-item.locked::after{content:'🔒';margin-left:auto;font-size:11px}

    /* Logout */
    .sb-footer{
      padding:12px 20px;
      border-top:1px solid var(--line);
    }
    .sb-logout{
      width:100%;display:flex;align-items:center;gap:8px;
      background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.2);
      color:#ff6b6b;border-radius:10px;padding:10px 14px;
      font-size:13px;font-weight:800;transition:.2s;
    }
    .sb-logout:hover{background:rgba(255,60,60,.15);border-color:rgba(255,60,60,.4)}

    /* ═══════════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════════ */
    .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

    /* Top bar */
    .topbar{
      height:64px;flex-shrink:0;
      background:rgba(6,5,4,.9);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 28px;gap:16px;
    }
    .topbar-left{display:flex;align-items:center;gap:12px}
    .topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em}
    .topbar-sub{color:var(--muted);font-size:12px;font-weight:600}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .topbar-pill{
      display:flex;align-items:center;gap:8px;
      background:rgba(255,255,255,.05);border:1px solid var(--line2);
      border-radius:999px;padding:6px 14px 6px 8px;
    }
    .topbar-av{width:30px;height:30px;border-radius:50%;border:2px solid var(--rank-color);object-fit:cover}
    .topbar-name{font-weight:800;font-size:13px}

    /* Page content */
    .page-content{flex:1;overflow-y:auto;padding:28px}
    .page-content::-webkit-scrollbar{width:4px}
    .page-content::-webkit-scrollbar-track{background:transparent}
    .page-content::-webkit-scrollbar-thumb{background:rgba(246,177,58,.15);border-radius:99px}

    /* ═══════════════════════════════════════
       LOADING / ERROR SCREENS
    ═══════════════════════════════════════ */
    .fullscreen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--bg);text-align:center;padding:40px}
    .spinner{width:48px;height:48px;border:3px solid rgba(88,101,242,.2);border-top-color:var(--discord);border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fs-text{color:var(--muted);font-size:15px;font-weight:600;animation:fp 1.6s ease-in-out infinite}
    @keyframes fp{0%,100%{opacity:1}50%{opacity:.4}}
    .fs-icon{font-size:72px}
    .fs-title{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;text-transform:uppercase}
    .fs-msg{color:var(--muted);font-size:16px;max-width:480px;line-height:1.6}
    .btn-primary{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--discord),#4752c4);color:#fff;font-weight:900;font-size:14px;border:none;border-radius:999px;padding:13px 26px;cursor:pointer;transition:.2s;box-shadow:0 4px 24px rgba(88,101,242,.3)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(88,101,242,.5)}
    .btn-ghost{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid var(--line2);color:var(--text);font-weight:800;font-size:14px;border-radius:999px;padding:12px 24px;cursor:pointer;transition:.2s}
    .btn-ghost:hover{background:rgba(255,255,255,.1);border-color:var(--gold)}

    /* ═══════════════════════════════════════
       CARDS & LAYOUT PRIMITIVES
    ═══════════════════════════════════════ */
    .card{background:rgba(255,255,255,.04);border:1px solid var(--line2);border-radius:var(--r);padding:22px}
    .card-gold{border-color:var(--line)}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
    .card-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
    .card-sub{color:var(--muted);font-size:12px;font-weight:600;margin-top:2px}

    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .flex-col{display:flex;flex-direction:column;gap:14px}
    .flex-row{display:flex;gap:14px;align-items:center}

    /* Stat cards */
    .stat-card{background:rgba(255,255,255,.04);border:1px solid var(--line2);border-radius:var(--r);padding:20px;transition:.2s}
    .stat-card:hover{border-color:rgba(246,177,58,.3)}
    .stat-icon{font-size:24px;margin-bottom:10px}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;line-height:1;color:var(--gold);margin-bottom:4px}
    .stat-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}

    /* Tags / badges */
    .tag{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 11px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;border:1px solid}
    .tag-live{color:#39ff82;background:rgba(57,255,130,.1);border-color:rgba(57,255,130,.3)}
    .tag-upcoming{color:#f6b13a;background:rgba(246,177,58,.1);border-color:rgba(246,177,58,.3)}
    .tag-ended{color:var(--muted);background:rgba(168,152,128,.08);border-color:rgba(168,152,128,.2)}
    .tag-pending{color:#fb923c;background:rgba(251,146,60,.1);border-color:rgba(251,146,60,.3)}
    .tag-approved{color:#6ee7b7;background:rgba(110,231,183,.1);border-color:rgba(110,231,183,.3)}
    .tag-denied{color:#ff6b6b;background:rgba(255,60,60,.1);border-color:rgba(255,60,60,.3)}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pd 1.6s ease-in-out infinite}
    @keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

    /* Tables */
    .data-table{width:100%;border-collapse:collapse}
    .data-table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;border-bottom:1px solid var(--line2)}
    .data-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
    .data-table tr:last-child td{border-bottom:none}
    .data-table tr:hover td{background:rgba(255,255,255,.025)}
    .data-table .td-avatar{display:flex;align-items:center;gap:10px}
    .td-av-img{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--rank-color);object-fit:cover}
    .td-name{font-weight:800;font-size:14px}
    .td-id{color:var(--muted);font-size:11px;font-family:monospace}

    /* Form elements */
    .form-group{display:flex;flex-direction:column;gap:7px}
    .form-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
    .form-input{background:rgba(255,255,255,.05);border:1px solid var(--line2);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;transition:.2s;width:100%}
    .form-input:focus{border-color:rgba(246,177,58,.5);background:rgba(255,255,255,.07)}
    .form-textarea{resize:vertical;min-height:80px}
    .form-select{appearance:none;cursor:pointer}
    .form-select option{background:#1a1a1a}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

    /* Buttons */
    .btn-sm{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:800;cursor:pointer;transition:.2s}
    .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#160b00}
    .btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,114,0,.35)}
    .btn-danger{background:rgba(255,60,60,.12);border:1px solid rgba(255,60,60,.3);color:#ff6b6b}
    .btn-danger:hover{background:rgba(255,60,60,.2)}
    .btn-success{background:rgba(57,255,130,.1);border:1px solid rgba(57,255,130,.3);color:#39ff82}
    .btn-success:hover{background:rgba(57,255,130,.18)}
    .btn-neutral{background:rgba(255,255,255,.06);border:1px solid var(--line2);color:var(--muted)}
    .btn-neutral:hover{background:rgba(255,255,255,.1);color:var(--text)}

    /* Action button row */
    .action-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

    /* Toasts */
    #toastContainer{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{background:rgba(15,13,11,.95);border:1px solid var(--line2);border-radius:12px;padding:13px 18px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:10px;min-width:260px;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.5);backdrop-filter:blur(12px);animation:toast-in .3s ease;pointer-events:all}
    .toast.success{border-color:rgba(57,255,130,.3);color:#39ff82}
    .toast.error{border-color:rgba(255,60,60,.3);color:#ff6b6b}
    .toast.info{border-color:rgba(246,177,58,.3);color:var(--gold)}
    @keyframes toast-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes toast-out{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:#0f0d0b;border:1px solid var(--line);border-radius:22px;padding:32px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.7)}
    .modal-box::-webkit-scrollbar{width:4px}
    .modal-box::-webkit-scrollbar-thumb{background:rgba(246,177,58,.2);border-radius:99px}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
    .modal-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;text-transform:uppercase}
    .modal-close{background:rgba(255,255,255,.06);border:1px solid var(--line2);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:.2s}
    .modal-close:hover{background:rgba(255,60,60,.12);border-color:rgba(255,60,60,.3);color:#ff6b6b}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

    /* Profile hero */
    .profile-hero{
      background:linear-gradient(155deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      border:1px solid var(--line);border-radius:22px;padding:28px 32px;
      display:flex;gap:24px;align-items:center;flex-wrap:wrap;margin-bottom:20px;
      position:relative;overflow:hidden;
    }
    .profile-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,var(--rank-color)18,transparent 70%);opacity:.12;pointer-events:none}
    .ph-avatar{width:90px;height:90px;border-radius:50%;border:3px solid var(--rank-color);object-fit:cover;box-shadow:0 0 30px color-mix(in srgb,var(--rank-color) 35%,transparent);flex-shrink:0}
    .ph-info{flex:1;min-width:180px}
    .ph-greeting{color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;margin-bottom:4px}
    .ph-name{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;text-transform:uppercase;line-height:.95;margin-bottom:10px}
    .ph-rank{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 16px;font-weight:900;font-size:13px;letter-spacing:.06em;text-transform:uppercase;border:1.5px solid}
    .ph-meta{display:flex;flex-direction:column;gap:8px}
    .ph-meta-item{background:rgba(255,255,255,.04);border:1px solid var(--line2);border-radius:10px;padding:10px 14px;min-width:140px}
    .ph-meta-label{color:var(--muted);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px}
    .ph-meta-val{font-weight:900;font-size:14px}

    /* Activity log */
    .activity-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .activity-item:last-child{border-bottom:none}
    .activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
    .activity-text{font-size:13px;line-height:1.5;flex:1}
    .activity-text strong{color:var(--text)}
    .activity-text span{color:var(--muted)}
    .activity-time{color:var(--muted);font-size:11px;white-space:nowrap;margin-top:2px}

    /* Event card */
    .event-row{display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,.03);border:1px solid var(--line2);border-radius:12px;transition:.2s}
    .event-row:hover{border-color:rgba(246,177,58,.25);background:rgba(255,255,255,.05)}
    .event-icon-box{width:44px;height:44px;border-radius:10px;background:rgba(246,177,58,.08);border:1px solid rgba(246,177,58,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .event-info{flex:1;min-width:0}
    .event-title{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .event-meta{color:var(--muted);font-size:12px;margin-top:2px}
    .event-actions{display:flex;gap:6px;flex-shrink:0}

    /* Staff account row */
    .staff-row{display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,.03);border:1px solid var(--line2);border-radius:12px;transition:.2s}
    .staff-row:hover{border-color:rgba(246,177,58,.2)}
    .sr-avatar{width:40px;height:40px;border-radius:50%;border:2px solid var(--rank-color);object-fit:cover;flex-shrink:0}
    .sr-info{flex:1;min-width:0}
    .sr-name{font-weight:800;font-size:14px}
    .sr-id{color:var(--muted);font-size:11px;font-family:monospace}
    .sr-actions{display:flex;gap:6px}

    /* Permission check */
    .perm-denied{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:300px;gap:14px;text-align:center;color:var(--muted);
      border:1px dashed rgba(255,60,60,.25);border-radius:var(--r);
      background:rgba(255,60,60,.03);
    }
    .perm-denied-icon{font-size:48px}
    .perm-denied-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;color:#ff6b6b}

    /* Section header inside pages */
    .page-header{margin-bottom:22px}
    .page-header h1{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em}
    .page-header p{color:var(--muted);font-size:14px;margin-top:4px}

    /* Toggle switch */
    .toggle{position:relative;width:40px;height:22px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:999px;cursor:pointer;transition:.3s;border:1px solid rgba(255,255,255,.1)}
    .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;border-radius:50%;background:#fff;transition:.3s}
    .toggle input:checked + .toggle-slider{background:rgba(57,255,130,.3);border-color:rgba(57,255,130,.5)}
    .toggle input:checked + .toggle-slider::before{transform:translateX(18px);background:var(--green)}

    /* Divider */
    .hr{height:1px;background:var(--line2);margin:18px 0}

    /* Empty state */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:48px 24px;text-align:center;color:var(--muted)}
    .empty-state-icon{font-size:40px;opacity:.5}
    .empty-state-text{font-size:14px}

    /* Scrollbar global */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(246,177,58,.15);border-radius:99px}

    /* Mobile hamburger */
    .mob-toggle{display:none;background:none;border:none;color:var(--gold);font-size:22px;padding:4px;cursor:pointer}
    .sidebar-overlay{display:none;position:fixed;inset:0;z-index:49;background:rgba(0,0,0,.6)}

    @media(max-width:900px){
      .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-overlay.show{display:block}
      .mob-toggle{display:block}
      .grid-4{grid-template-columns:1fr 1fr}

  { id:'ADMIN_ROLE_ID',           label:'Admin',            color:'#a78bfa', bg:'rgba(167,139,250,.12)', border:'rgba(167,139,250,.35)', emoji:'🔱', level:40  },
  { id:'MODERATOR_ROLE_ID',       label:'Moderator',        color:'#38bdf8', bg:'rgba(56,189,248,.12)',  border:'rgba(56,189,248,.35)',  emoji:'🛡', level:20  },
  { id:'SUPPORT_ROLE_ID',         label:'Support',          color:'#6ee7b7', bg:'rgba(110,231,183,.12)', border:'rgba(110,231,183,.3)',  emoji:'🤝', level:10  },

// ═══════════════════════════════════════════════════════════════════
// PERMISSION HELPERS
// ═══════════════════════════════════════════════════════════════════

let state = {

function can(p){ return state.level >= p; }

// ═══════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════════
function showScreen(id){
  ['loadingScreen','deniedScreen','errorScreen'].forEach(s => {
    const el = document.getElementById(s);
    if(el) el.style.display = s===id ? 'flex' : 'none';
  });
  const app = document.getElementById('app');
  if(id==='app') { app.style.display='flex'; } else { app.style.display='none'; }
}

function setLoading(txt){ showScreen('loadingScreen'); document.getElementById('loadingText').textContent=txt||'Loading…'; }

function showError(msg){ document.getElementById('errorMsg').textContent=msg; showScreen('errorScreen'); }

function toast(msg, type='info'){
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  const icons={success:'✅',error:'❌',info:'ℹ️'};
  t.className=`toast ${type}`;
  t.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.animation='toast-out .3s ease forwards'; setTimeout(()=>t.remove(),300); },3500);
}

function openModal(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

function confirm(title, msg, onOk){
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMsg').textContent=msg;
  const btn=document.getElementById('confirmOkBtn');
  btn.onclick=()=>{ onOk(); closeModal('confirmModal'); };
  openModal('confirmModal');
}

function setTopbar(title, sub='Empire Roleplay Staff Portal'){
  document.getElementById('topbarTitle').textContent=title;
  document.getElementById('topbarSub').textContent=sub;
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

function avatarUrl(user, size=256){
  if(user.avatar){
    const ext=user.avatar.startsWith('a_')?'gif':'png';
    return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=${size}`;
  }
  return `https://cdn.discordapp.com/embed/avatars/${Number(BigInt(user.id)>>22n)%6}.png`;
}

function defaultAvatar(id){
  return `https://cdn.discordapp.com/embed/avatars/${Number(id)%6}.png`;
}

function statusTag(status){
  const map={
    live:     '<span class="tag tag-live"><span class="live-dot"></span>Live</span>',
    upcoming: '<span class="tag tag-upcoming">📅 Upcoming</span>',
    ended:    '<span class="tag tag-ended">✓ Ended</span>',
    pending:  '<span class="tag tag-pending">⏳ Pending</span>',
    approved: '<span class="tag tag-approved">✅ Approved</span>',
    denied:   '<span class="tag tag-denied">✗ Denied</span>',
  };
  return map[status]||`<span class="tag">${status}</span>`;
}

// ═══════════════════════════════════════════════════════════════════
// SIDEBAR NAVIGATION — role-gated items
// ═══════════════════════════════════════════════════════════════════
function buildSidebar(){
  const nav = document.getElementById('sidebarNav');
  const items = [
    { section: 'Overview' },
    { id:'dashboard', icon:'🏠', label:'Dashboard' },
    { id:'profile',   icon:'👤', label:'My Profile' },

    { section: 'Events', minLevel: PERM.SUPPORT },
    { id:'events',    icon:'🎪', label:'Events',         badge: state.events.filter(e=>e.status==='pending').length || null, minLevel:PERM.SUPPORT },
    { id:'live',      icon:'🔴', label:'Live Events',    minLevel:PERM.SUPPORT },
    { id:'submit',    icon:'➕', label:'Create Event',   minLevel:PERM.EVENT_OVERSIGHT },

    { section: 'Administration', minLevel: PERM.HEAD_ADMIN },
    { id:'activity',  icon:'📋', label:'Activity Log',   minLevel:PERM.HEAD_ADMIN },
    { id:'staff',     icon:'👥', label:'Staff Accounts', minLevel:PERM.MANAGEMENT },
    { id:'stats',     icon:'📊', label:'Statistics',     minLevel:PERM.MANAGEMENT },
  ];

  nav.innerHTML='';
  items.forEach(item=>{
    if(item.section!==undefined){
      if(item.minLevel!==undefined && !can(item.minLevel)) return;
      const lbl=document.createElement('div');
      lbl.className='sb-section-label';
      lbl.textContent=item.section;
      nav.appendChild(lbl);
      return;
    }
    const locked=(item.minLevel!==undefined && !can(item.minLevel));
    const btn=document.createElement('button');
    btn.className=`sb-item${state.currentPage===item.id?' active':''}${locked?' locked':''}`;
    btn.dataset.page=item.id;
    let html=`<span class="sb-item-icon">${item.icon}</span><span>${item.label}</span>`;
    if(item.badge) html+=`<span class="sb-item-badge">${item.badge}</span>`;
    btn.innerHTML=html;
    if(!locked){ btn.onclick=()=>{ navigateTo(item.id); closeSidebar(); }; }
    nav.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════
function navigateTo(page){
  state.currentPage=page;
  // Update active in sidebar
  document.querySelectorAll('.sb-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.page===page);
  });
  // Render page
  const pc=document.getElementById('pageContent');
  const pages={
    dashboard: renderDashboard,
    profile:   renderProfile,
    events:    renderEvents,
    live:      renderLiveEvents,
    submit:    renderCreateEvent,
    activity:  renderActivityLog,
    staff:     renderStaffAccounts,
    stats:     renderStats,
  };
  if(pages[page]) pages[page](pc);
  else pc.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🚧</div><div>Page not found</div></div>`;
}

function renderEvents(pc){
  setTopbar('Events','All city events');
  const canManage=can(PERM.EVENT_OVERSIGHT);
  const canCreate=can(PERM.EVENT_OVERSIGHT);

  pc.innerHTML=`
    <div class="flex-col">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:0">
        <div><h1>Events</h1><p>All scheduled and past Empire RP events</p></div>
        ${canCreate?`<button class="btn-sm btn-gold" style="padding:10px 18px;font-size:13px" onclick="openEventModal()">➕ Create Event</button>`:''}
      </div>

      <!-- Filter tabs -->
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${['all','live','upcoming','pending','ended'].map(s=>`
          <button onclick="filterEvents('${s}',this)" data-filter="${s}" class="btn-sm ${s==='all'?'btn-gold':'btn-neutral'}" style="${s==='all'?'':''}">
            ${s==='all'?'All':s.charAt(0).toUpperCase()+s.slice(1)}
            ${s!=='all'?`(${state.events.filter(e=>e.status===s).length})`:``}
          </button>
        `).join('')}
      </div>

      <div class="card card-gold" id="eventsListCard">
        <div id="eventsList" class="flex-col" style="gap:10px"></div>
      </div>
    </div>
  `;
  renderEventList('all');
}

function filterEvents(f, btn){
  document.querySelectorAll('[data-filter]').forEach(b=>{ b.className='btn-sm btn-neutral'; });
  btn.className='btn-sm btn-gold';
  renderEventList(f);
}

function renderEventList(filter){
  const el=document.getElementById('eventsList');
  if(!el) return;
  const list=filter==='all'?state.events:state.events.filter(e=>e.status===filter);
  if(!list.length){ el.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🎪</div><div class="empty-state-text">No events found</div></div>`; return; }
  const canManage=can(PERM.EVENT_OVERSIGHT);
  el.innerHTML=list.map(ev=>`
    <div class="event-row" id="ev-${ev.id}">
      <div class="event-icon-box">${ev.emoji}</div>
      <div class="event-info">
        <div class="event-title">${ev.title}</div>
        <div class="event-meta">${ev.type} · ${ev.date} · by ${ev.createdBy}</div>
      </div>
      ${statusTag(ev.status)}
      ${canManage||ev.status==='pending'?`
      <div class="event-actions">
        ${ev.status==='upcoming'?`<button class="btn-sm btn-success" onclick="goLive('${ev.id}')">🔴 Go Live</button>`:''}
        ${ev.status==='live'?`<button class="btn-sm btn-danger" onclick="endEvent('${ev.id}')">⏹ End</button>`:''}
        ${ev.status==='pending'&&canManage?`<button class="btn-sm btn-success" onclick="approveEvent('${ev.id}')">✅ Approve</button><button class="btn-sm btn-danger" onclick="denyEvent('${ev.id}')">✗ Deny</button>`:''}
        ${canManage&&ev.status!=='ended'?`<button class="btn-sm btn-neutral" onclick="openEditEvent('${ev.id}')">✏️</button>`:''}
        ${can(PERM.MANAGEMENT)?`<button class="btn-sm btn-danger" onclick="deleteEvent('${ev.id}')">🗑</button>`:''}
      </div>`:''}
    </div>
  `).join('');
}

function goLive(id){
  const ev=state.events.find(e=>e.id===id);
  if(!ev||!can(PERM.EVENT_OVERSIGHT)) return;
  confirm('Go Live', `Mark "${ev.title}" as LIVE?`, ()=>{
    ev.status='live';
    state.activityLog.unshift({id:Date.now(),type:'event',color:'#39ff82',text:`<strong>${state.member.displayName}</strong> marked <strong>${ev.title}</strong> as Live`,time:'just now'});
    renderEventList(document.querySelector('[data-filter].btn-gold')?.dataset.filter||'all');
    buildSidebar(); toast(`${ev.title} is now LIVE!`,'success');
  });
}

function endEvent(id){
  const ev=state.events.find(e=>e.id===id);
  if(!ev||!can(PERM.EVENT_OVERSIGHT)) return;
  confirm('End Event', `End "${ev.title}"?`, ()=>{
    ev.status='ended';
    state.activityLog.unshift({id:Date.now(),type:'event',color:'var(--muted)',text:`<strong>${state.member.displayName}</strong> ended <strong>${ev.title}</strong>`,time:'just now'});
    renderEventList(document.querySelector('[data-filter].btn-gold')?.dataset.filter||'all');
    toast(`${ev.title} has ended.`,'info');
  });
}

function approveEvent(id){
  const ev=state.events.find(e=>e.id===id);
  if(!ev||!can(PERM.EVENT_OVERSIGHT)) return;
  ev.status='upcoming';
  state.activityLog.unshift({id:Date.now(),type:'event',color:'#6ee7b7',text:`<strong>${state.member.displayName}</strong> approved <strong>${ev.title}</strong>`,time:'just now'});
  renderEventList(document.querySelector('[data-filter].btn-gold')?.dataset.filter||'all');
  buildSidebar(); toast(`${ev.title} approved!`,'success');
}

function denyEvent(id){
  const ev=state.events.find(e=>e.id===id);
  if(!ev||!can(PERM.EVENT_OVERSIGHT)) return;
  confirm('Deny Submission',`Deny "${ev.title}"?`,()=>{
    ev.status='denied';
    state.activityLog.unshift({id:Date.now(),type:'event',color:'#ff6b6b',text:`<strong>${state.member.displayName}</strong> denied <strong>${ev.title}</strong>`,time:'just now'});
    renderEventList(document.querySelector('[data-filter].btn-gold')?.dataset.filter||'all');
    toast(`${ev.title} denied.`,'error');
  });
}

function deleteEvent(id){
  const ev=state.events.find(e=>e.id===id);
  if(!ev||!can(PERM.MANAGEMENT)) return;
  confirm('Delete Event',`Permanently delete "${ev.title}"? This cannot be undone.`,()=>{
    state.events=state.events.filter(e=>e.id!==id);
    state.activityLog.unshift({id:Date.now(),type:'event',color:'#ff3c3c',text:`<strong>${state.member.displayName}</strong> deleted event <strong>${ev.title}</strong>`,time:'just now'});
    renderEvents(document.getElementById('pageContent'));
    toast(`${ev.title} deleted.`,'error');
  });
}

function openEditEvent(id){ openEventModal(id); }

function saveNewEvent(){
  const title=document.getElementById('evTitle').value.trim();
  if(!title){ toast('Event title is required','error'); return; }
  const newEv={
    id:'ev'+Date.now(), title, emoji:document.getElementById('evEmoji').value||'🎪',
    type:document.getElementById('evType').value,
    date:document.getElementById('evDate').value.replace('T',' ')||'TBD',
    host:document.getElementById('evHost').value||'EmpireStaff',
    desc:document.getElementById('evDesc').value,
    status:'upcoming', created:new Date().toISOString().split('T')[0], createdBy:state.member.displayName,
  };
  state.events.unshift(newEv);
  state.activityLog.unshift({id:Date.now(),type:'event',color:'#f6b13a',text:`<strong>${state.member.displayName}</strong> created event <strong>${title}</strong>`,time:'just now'});
  closeModal('eventModal');
  navigateTo('events');
  buildSidebar();
  toast(`"${title}" created!`,'success');
}

function saveEditEvent(id){
  const ev=state.events.find(e=>e.id===id);
  if(!ev) return;
  ev.title=document.getElementById('evTitle').value.trim()||ev.title;
  ev.emoji=document.getElementById('evEmoji').value||ev.emoji;
  ev.type=document.getElementById('evType').value;
  ev.date=document.getElementById('evDate').value.replace('T',' ')||ev.date;
  ev.host=document.getElementById('evHost').value||ev.host;
  ev.desc=document.getElementById('evDesc').value;
  state.activityLog.unshift({id:Date.now(),type:'event',color:'#a78bfa',text:`<strong>${state.member.displayName}</strong> edited event <strong>${ev.title}</strong>`,time:'just now'});
  closeModal('eventModal');
  navigateTo('events');
  toast('Event updated!','success');
}

function staffRowHtml(s){
  return `
    <div class="staff-row" id="sr-${s.id}">
      <img class="sr-avatar" src="${defaultAvatar(s.id)}" style="border-color:${s.roleColor}" alt="${s.displayName}" onerror="this.src='${defaultAvatar(s.id)}'">
      <div class="sr-info">
        <div class="sr-name">${s.displayName}</div>
        <div class="sr-id">@${s.username} · ${s.id}</div>
      </div>
      <span class="tag" style="color:${s.roleColor};background:${s.roleColor}18;border-color:${s.roleColor}55">${s.roleLabel}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <label class="toggle" title="Active status"><input type="checkbox" ${s.active?'checked':''} onchange="toggleStaffActive('${s.id}',this.checked)"><span class="toggle-slider"></span></label>
        <span style="font-size:11px;color:${s.active?'var(--green)':'var(--muted)'};font-weight:800">${s.active?'Active':'Inactive'}</span>
      </div>
      <div class="sr-actions">
        <button class="btn-sm btn-neutral" onclick="toast('Staff profile editing via Discord role management.','info')">✏️</button>
        <button class="btn-sm btn-danger" onclick="removeStaff('${s.id}')">🗑</button>
      </div>
    </div>
  `;
}

function toggleStaffActive(id, active){
  const s=state.staffAccounts.find(x=>x.id===id);
  if(!s) return;
  s.active=active;
  state.activityLog.unshift({id:Date.now(),type:'staff',color:'#38bdf8',text:`<strong>${state.member.displayName}</strong> set <strong>${s.displayName}</strong> to ${active?'active':'inactive'}`,time:'just now'});
  const label=document.querySelector(`#sr-${id} span:last-of-type`);
  if(label){ label.textContent=active?'Active':'Inactive'; label.style.color=active?'var(--green)':'var(--muted)'; }
  toast(`${s.displayName} set to ${active?'active':'inactive'}.`,active?'success':'info');
}

function removeStaff(id){
  const s=state.staffAccounts.find(x=>x.id===id);
  if(!s) return;
  confirm('Remove Staff Member',`Remove ${s.displayName} from the staff list?`,()=>{
    state.staffAccounts=state.staffAccounts.filter(x=>x.id!==id);
    state.activityLog.unshift({id:Date.now(),type:'staff',color:'#ff3c3c',text:`<strong>${state.member.displayName}</strong> removed staff member <strong>${s.displayName}</strong>`,time:'just now'});
    document.getElementById(`sr-${id}`)?.remove();
    toast(`${s.displayName} removed.`,'error');
  });
}

        <div class="stat-card"><div class="stat-icon">🔴</div><div class="stat-val" style="color:var(--green)">${live}</div><div class="stat-label">Live Now</div></div>
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-val">${state.staffAccounts.length}</div><div class="stat-label">Staff Members</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val" style="color:var(--green)">${activeStaff}</div><div class="stat-label">Active Staff</div></div>
      </div>
      <div class="grid-2">
        <div class="card card-gold">
          <div class="card-header"><div class="card-title">🎪 Events Breakdown</div></div>
          ${[
            ['Live',     live,     'var(--green)'],
            ['Upcoming', upcoming, 'var(--gold)'],
            ['Pending',  pending,  '#fb923c'],
            ['Ended',    ended,    'var(--muted)'],
          ].map(([label,val,color])=>`
            <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
              <div style="font-size:13px;font-weight:700;flex:1">${label}</div>
              <div style="background:${color}22;border-radius:999px;height:6px;flex:3;overflow:hidden"><div style="height:100%;background:${color};border-radius:999px;width:${total?Math.round(val/total*100):0}%"></div></div>
              <div style="font-weight:900;font-size:14px;color:${color};min-width:24px;text-align:right">${val}</div>
            </div>
          `).join('')}
        </div>
        <div class="card card-gold">
          <div class="card-header"><div class="card-title">👥 Staff by Role</div></div>
          ${byRole.filter(r=>r.count>0).map(r=>`
            <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
              <span style="font-size:16px">${r.emoji}</span>
              <div style="font-size:13px;font-weight:700;flex:1;color:${r.color}">${r.label}</div>
              <div style="font-weight:900;font-size:16px;color:${r.color}">${r.count}</div>
            </div>
          `).join('')}
          ${byRole.every(r=>r.count===0)?`<div class="empty-state"><div class="empty-state-icon">👥</div><div>No staff data</div></div>`:''}
        </div>
      </div>
      <div class="card card-gold">
        <div class="card-header"><div class="card-title">📋 Recent Activity Summary</div></div>
        <div>${state.activityLog.slice(0,8).map(a=>`
          <div class="activity-item">
            <div class="activity-dot" style="background:${a.color}"></div>
            <div style="flex:1"><div class="activity-text">${a.text}</div><div style="color:var(--muted);font-size:11px;margin-top:2px">${a.time}</div></div>
          </div>
        `).join('')}</div>
      </div>
    </div>
  `;
}

function permDenied(){
  return `<div class="perm-denied"><div class="perm-denied-icon">🔒</div><div class="perm-denied-title">Access Restricted</div><p style="font-size:14px;max-width:320px;line-height:1.6">You don't have the required permissions to view this section. Contact a higher-ranking staff member if you need access.</p></div>`;
}

// ═══════════════════════════════════════════════════════════════════
// DISCORD AUTH
// ═══════════════════════════════════════════════════════════════════
async function discordGet(endpoint, token){
  const r=await fetch(`https://discord.com/api/v10${endpoint}`,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

async function init(){
  setLoading('Connecting to Discord…');

  // Try stored token
  let token=sessionStorage.getItem('emp_token');
  const hash=window.location.hash.slice(1);
  const params=new URLSearchParams(hash);

  if(!token && params.has('access_token')){
    // Verify state
    const inState=params.get('state');
    const savedState=sessionStorage.getItem('emp_oauth_state');
    if(savedState && inState && savedState!==inState){ showError('Security check failed. Please log in again.'); return; }
    token=params.get('access_token');
    sessionStorage.setItem('emp_token', token);
    window.history.replaceState({},document.title,window.location.pathname);
  }

  if(!token){ window.location.href='staff-login.html'; return; }

  const DEMO=CONFIG.CLIENT_ID==='YOUR_CLIENT_ID_HERE';

  try {
    setLoading('Fetching your Discord profile…');
    let user;
    if(DEMO){
      user={id:'000000000000000001',username:'demo_staff',global_name:'Demo Staff',avatar:null,discriminator:'0'};
    } else {
      user=await discordGet('/users/@me', token);
    }

    setLoading('Checking Empire RP roles…');
    let memberRoles=[], memberNick=null, memberAvatar=null;

    if(!DEMO){
      try {
        const member=await discordGet(`/users/@me/guilds/${CONFIG.GUILD_ID}/member`, token);
        memberRoles=member.roles||[];
        memberNick=member.nick||null;
        if(member.avatar){
          const ext=member.avatar.startsWith('a_')?'gif':'png';
          memberAvatar=`https://cdn.discordapp.com/guilds/${CONFIG.GUILD_ID}/users/${user.id}/avatars/${member.avatar}.${ext}?size=256`;
        }
      } catch(e){
        if(!DEMO) { showError("You don't appear to be in the Empire RP Discord. Join at discord.gg/empirerp"); return; }
      }
    }

    // Match roles
    let matched;
    if(DEMO){
      // Demo mode: assign Management so everything is visible
      matched=ROLES;
    } else {
      matched=ROLES.filter(r=>memberRoles.includes(r.id)).sort((a,b)=>b.level-a.level);
      if(!matched.length){ showScreen('deniedScreen'); return; }
    }

    const primaryRole=matched[0];
    const pfp=memberAvatar||avatarUrl(user);
    const displayName=memberNick||user.global_name||user.username;

    state.user=user;
    state.token=token;
    state.primaryRole=primaryRole;
    state.allRoles=matched;
    state.level=primaryRole.level;
    state.member={ pfp, displayName };

    // Apply rank CSS vars
    document.documentElement.style.setProperty('--rank-color', primaryRole.color);
    document.documentElement.style.setProperty('--rank-bg', primaryRole.bg);
    document.documentElement.style.setProperty('--rank-border', primaryRole.border);

    // Fill persistent UI
    document.getElementById('sbAvatar').src=pfp;
    document.getElementById('sbAvatar').onerror=function(){ this.src=`https://cdn.discordapp.com/embed/avatars/0.png`; };
    document.getElementById('sbDisplayName').textContent=displayName;
    document.getElementById('sbRankLabel').textContent=`${primaryRole.emoji} ${primaryRole.label}`;
    document.getElementById('sbRankDot').style.background=primaryRole.color;
    document.getElementById('topbarAv').src=pfp;
    document.getElementById('topbarName').textContent=displayName;

    initMockData();
    buildSidebar();
    showScreen('app');
    navigateTo('dashboard');

    if(DEMO) toast('Running in demo mode — set real role IDs to restrict access','info');

  } catch(err){
    console.error(err);
    if(err.message==='401'){ sessionStorage.removeItem('emp_token'); window.location.href='staff-login.html'; }
    else showError(`Authentication failed: ${err.message}`);
  }
}

function logout(){
  sessionStorage.removeItem('emp_token');
  window.location.href='staff-login.html';
}

init();
</script>
</body>
</html>
